{% load static %}
<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Invoice{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="min-h-screen bg-slate-50 text-slate-950">
  {% if user.is_authenticated %}
  <header class="site-header sticky top-0 z-30 border-b border-slate-200 bg-white/95 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-3">
      <a href="{% url 'invoice_list' %}" class="text-base font-semibold tracking-tight">Invoice</a>
      <nav class="flex items-center gap-1 overflow-x-auto text-sm">
        <a class="nav-link" href="{% url 'invoice_list' %}">Invoice</a>
        <a class="nav-link" href="{% url 'company_list' %}">Perusahaan</a>
        <a class="nav-link" href="{% url 'customer_list' %}">Customer</a>
        <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="nav-link" type="submit">Logout</button></form>
      </nav>
    </div>
  </header>
  {% endif %}
  <main class="mx-auto max-w-6xl px-4 py-5 sm:py-8">
    {% for message in messages %}
      <div class="mb-4 rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm {% if message.tags == 'error' %}text-red-700{% else %}text-emerald-700{% endif %}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
