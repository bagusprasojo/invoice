{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-xl"><a class="mb-4 inline-block text-sm font-medium text-slate-600" href="{{ back_url }}">Kembali</a><div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm"><h1 class="mb-5 text-2xl font-semibold tracking-tight">{{ title }}</h1><form method="post" class="space-y-4">{% csrf_token %}{% for field in form %}<label class="block text-sm font-medium">{{ field.label }}<div class="mt-1">{{ field }}</div>{% if field.errors %}<p class="mt-1 text-xs text-red-600">{{ field.errors|striptags }}</p>{% endif %}</label>{% endfor %}<button class="btn-primary w-full" type="submit">{{ submit_label|default:'Simpan' }}</button></form></div></div>
{% endblock %}
