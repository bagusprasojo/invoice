{% if page_obj.paginator.num_pages > 1 %}
<div class="flex flex-col gap-3 border-t border-slate-100 px-4 py-3 text-sm sm:flex-row sm:items-center sm:justify-between">
  <p class="text-slate-500">Halaman {{ page_obj.number }} dari {{ page_obj.paginator.num_pages }}</p>
  <div class="flex gap-2">
    {% if page_obj.has_previous %}<a class="btn-secondary" href="?q={{ query|urlencode }}&page={{ page_obj.previous_page_number }}">Sebelumnya</a>{% endif %}
    {% if page_obj.has_next %}<a class="btn-secondary" href="?q={{ query|urlencode }}&page={{ page_obj.next_page_number }}">Berikutnya</a>{% endif %}
  </div>
</div>
{% endif %}
