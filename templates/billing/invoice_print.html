<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ invoice.number }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-950">
  <main class="mx-auto max-w-6xl px-4 py-5 sm:py-8">
    <div class="mb-5 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between invoice-actions">
      <div>
        <a class="text-sm font-medium text-slate-600" href="{% url 'invoice_detail' invoice.pk %}">Kembali</a>
        <h1 class="mt-1 text-2xl font-semibold tracking-tight">{{ invoice.number }}</h1>
      </div>
      <div class="flex gap-2">
        <button class="btn-secondary" type="button" onclick="window.print()">Cetak</button>
        <a class="btn-primary" href="{% url 'invoice_pdf' invoice.pk %}" target="_blank">PDF</a>
      </div>
    </div>
    {% include 'billing/_invoice_document.html' %}
  </main>
</body>
</html>
