{% extends 'base.html' %}
{% block title %}Hapus {{ customer.name }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-lg rounded-xl border border-red-200 bg-white p-5 shadow-sm"><p class="text-sm font-semibold text-red-600">Hapus customer</p><h1 class="mt-1 text-2xl font-semibold tracking-tight">{{ customer.name }}</h1><p class="mt-3 text-sm text-slate-600">Customer dari {{ customer.company.name }} akan dihapus. Data tidak bisa dihapus jika sudah dipakai pada invoice.</p><form method="post" class="mt-6 flex flex-col gap-2 sm:flex-row sm:justify-end">{% csrf_token %}<a class="btn-secondary" href="{% url 'customer_detail' customer.pk %}">Batal</a><button class="inline-flex items-center justify-center rounded-lg bg-red-600 px-4 py-2.5 text-sm font-bold text-white" type="submit">Hapus Customer</button></form></div>
{% endblock %}
