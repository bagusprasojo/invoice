{% extends 'base.html' %}
{% block title %}{{ title|default:'Buat Invoice' }}{% endblock %}
{% block content %}
<div class="mb-5">
  <p class="text-sm text-slate-500">{{ subtitle|default:'Invoice baru' }}</p>
  <h1 class="text-2xl font-semibold tracking-tight">{{ title|default:'Buat Invoice' }}</h1>
</div>
<form method="post" class="space-y-4" x-data="invoiceBuilder(JSON.parse('{{ initial_state_json|escapejs }}'))">{% csrf_token %}
  <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="grid gap-4 sm:grid-cols-2">
      <label class="block text-sm font-medium">Perusahaan
        <select name="company" required class="mt-1 input" x-model="company" @change="loadCustomers()">
          <option value="">Pilih perusahaan</option>
          {% for company in companies %}<option value="{{ company.id }}">{{ company.code }} - {{ company.name }}</option>{% endfor %}
        </select>
      </label>
      <label class="block text-sm font-medium">Customer
        <select name="customer" required class="mt-1 input" x-model="customer" :disabled="!company">
          <option value="">Pilih customer</option>
          <template x-for="item in customers" :key="item.id"><option :value="String(item.id)" x-text="item.name"></option></template>
        </select>
      </label>
    </div>
  </section>
  <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="space-y-3">
      <template x-for="(item, index) in items" :key="index">
        <div class="rounded-lg border border-slate-200 p-3">
          <div class="grid gap-3 sm:grid-cols-5">
            <label class="sm:col-span-2 text-sm font-medium">Produk<input name="product_name" required class="mt-1 input" x-model="item.product_name" placeholder="Nama produk"></label>
            <label class="text-sm font-medium">Harga<input name="price" type="number" min="0" step="1" class="mt-1 input" x-model.number="item.price"></label>
            <label class="text-sm font-medium">Diskon<input name="discount" type="number" min="0" step="1" class="mt-1 input" x-model.number="item.discount"></label>
            <label class="text-sm font-medium">Qty<input name="quantity" type="number" min="1" step="1" class="mt-1 input" x-model.number="item.quantity"></label>
          </div>
          <div class="mt-3 flex items-center justify-between gap-3 text-sm"><button type="button" class="text-red-600" @click="removeItem(index)" x-show="items.length > 1">Hapus</button><p class="font-semibold" x-text="rupiah(lineTotal(item))"></p></div>
        </div>
      </template>
    </div>
    <button class="btn-secondary mt-3 w-full sm:w-auto" type="button" @click="addItem()">Tambah</button>
  </section>
  <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
    <label class="block text-sm font-medium">Cash Diskon<input name="cash_discount" type="number" min="0" step="1" class="mt-1 input" x-model.number="cashDiscount"></label>
    <label class="mt-4 block text-sm font-medium">Catatan<textarea name="notes" class="mt-1 input min-h-24" placeholder="Opsional" x-model="notes"></textarea></label>
    <div class="mt-5 rounded-lg bg-slate-950 p-4 text-white"><div class="flex justify-between text-sm text-slate-300"><span>Subtotal</span><span x-text="rupiah(subtotal())"></span></div><div class="mt-2 flex justify-between text-sm text-slate-300"><span>Cash Diskon</span><span x-text="rupiah(cashDiscount || 0)"></span></div><div class="mt-4 flex justify-between text-xl font-semibold"><span>Total</span><span x-text="rupiah(total())"></span></div></div>
  </section>
  <div class="flex flex-col gap-2 sm:flex-row sm:justify-end">
    {% if invoice %}<a class="btn-secondary" href="{% url 'invoice_detail' invoice.pk %}">Batal</a>{% else %}<a class="btn-secondary" href="{% url 'invoice_list' %}">Batal</a>{% endif %}
    <button class="btn-primary py-3" type="submit">{{ submit_label|default:'Simpan Invoice' }}</button>
  </div>
</form>
<script>
function invoiceBuilder(initial) { return { company: initial.company || '', customer: initial.customer || '', customers: initial.customers || [], cashDiscount: initial.cashDiscount || 0, notes: initial.notes || '', items: initial.items && initial.items.length ? initial.items : [{product_name: '', price: 0, discount: 0, quantity: 1}], async loadCustomers() { this.customer = ''; this.customers = []; if (!this.company) return; const response = await fetch(`/api/companies/${this.company}/customers/`); const data = await response.json(); this.customers = data.customers; }, addItem() { this.items.push({product_name: '', price: 0, discount: 0, quantity: 1}); }, removeItem(index) { this.items.splice(index, 1); }, lineTotal(item) { return Math.max((Number(item.price) || 0) * (Number(item.quantity) || 1) - (Number(item.discount) || 0), 0); }, subtotal() { return this.items.reduce((sum, item) => sum + this.lineTotal(item), 0); }, total() { return Math.max(this.subtotal() - (Number(this.cashDiscount) || 0), 0); }, rupiah(value) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(value || 0); } } }
</script>
{% endblock %}
