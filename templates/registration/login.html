{% extends 'base.html' %}
{% block title %}Login Admin{% endblock %}
{% block content %}
<div class="mx-auto flex min-h-[75vh] max-w-md items-center">
  <div class="w-full rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <div class="mb-6">
      <p class="text-sm font-medium text-slate-500">Admin</p>
      <h1 class="mt-1 text-2xl font-semibold tracking-tight">Masuk ke Invoice</h1>
    </div>
    {% if form.errors %}<p class="mb-4 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700">Username atau password tidak valid.</p>{% endif %}
    <form method="post" class="space-y-4">{% csrf_token %}
      <label class="block text-sm font-medium">Username
        <input name="username" autofocus required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
      </label>
      <label class="block text-sm font-medium">Password
        <input name="password" type="password" required class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200">
      </label>
      <button class="w-full rounded-lg bg-slate-950 px-4 py-3 text-sm font-semibold text-white" type="submit">Login</button>
    </form>
  </div>
</div>
{% endblock %}
